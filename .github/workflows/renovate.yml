name: Renovate (all repos)

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 8am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    name: Dependency updates (all repos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Run Renovate
        run: npx renovate@latest
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_PAT }}
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: '["jplannnou/gundo-ui","jplannnou/Gundo_Engine","jplannnou/Gundo_Finance","jplannnou/Gundo_Radar","jplannnou/jp-assistant","jplannnou/gundo-feedback","jplannnou/gundo-feedback-sdk"]'
          RENOVATE_AUTODISCOVER: 'false'
          RENOVATE_CONFIG_FILE: renovate.json
          RENOVATE_DEPENDENCY_DASHBOARD: 'false'
          RENOVATE_ONBOARDING: 'false'
          LOG_LEVEL: warn
